<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brakte</title>
  <link rel="stylesheet" href="./css/style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            logo: ['"Audiowide"', 'sans-serif'],
            serif: ['"Quicksand"', 'system-ui', 'sans-serif'],
            sans: ['"Quicksand"', 'system-ui', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <script type="importmap">
    {
      "imports": {
        "@hotwired/stimulus": "https://unpkg.com/@hotwired/stimulus@3.2.2/dist/stimulus.js"
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Quicksand:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>
  <div id="dappled-light">
    <div id="glow"></div>
    <div id="glow-bounce"></div>
    <div class="perspective">
      <div id="leaves">
        <svg style="width: 0; height: 0; position: absolute;">
          <defs>
            <filter id="wind" x="-20%" y="-20%" width="140%" height="140%">
              <feTurbulence type="fractalNoise" numOctaves="2" seed="1">
                <animate attributeName="baseFrequency" dur="16s" keyTimes="0;0.33;0.66;1"
                  values="0.005 0.003;0.01 0.009;0.008 0.004;0.005 0.003" repeatCount="indefinite" />
              </feTurbulence>
              <feDisplacementMap in="SourceGraphic">
                <animate attributeName="scale" dur="20s" keyTimes="0;0.25;0.5;0.75;1" values="45;55;75;55;45"
                  repeatCount="indefinite" />
              </feDisplacementMap>
            </filter>
          </defs>
        </svg>
      </div>
      <div id="blinds">
        <div class="shutters">
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
          <div class="shutter"></div>
        </div>
        <div class="vertical">
          <div class="bar"></div>
          <div class="bar"></div>
        </div>
      </div>
    </div>
    <div id="progressive-blur">
      <div></div>
      <div></div>
      <div></div>
      <div></div>
    </div>
  </div>

  <main class="relative min-h-screen flex flex-col items-center justify-center" data-controller="page">
    <div class="text-center z-10">
      <h1 class="brand-title font-logo text-6xl md:text-8xl tracking-wide mb-4">
        brakte
      </h1>
      <p class="brand-subtitle font-serif italic text-2xl md:text-3xl mb-12">
        Yakında
      </p>
      <a href="https://instagram.com/brakte.cafe" target="_blank" rel="noopener noreferrer"
        class="ig-link inline-flex items-center gap-2 transition-colors duration-300 font-sans text-sm tracking-widest uppercase"
      >
        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
          <path fill-rule="evenodd"
            d="M12.315 2c2.43 0 2.784.013 3.808.06 1.064.049 1.791.218 2.427.465a4.902 4.902 0 011.772 1.153 4.902 4.902 0 011.153 1.772c.247.636.416 1.363.465 2.427.048 1.067.06 1.407.06 4.123v.08c0 2.643-.012 2.987-.06 4.043-.049 1.064-.218 1.791-.465 2.427a4.902 4.902 0 01-1.153 1.772 4.902 4.902 0 01-1.772 1.153c-.636.247-1.363.416-2.427.465-1.067.048-1.407.06-4.123.06h-.08c-2.643 0-2.987-.012-4.043-.06-1.064-.049-1.791-.218-2.427-.465a4.902 4.902 0 01-1.772-1.153 4.902 4.902 0 01-1.153-1.772c-.247-.636-.416-1.363-.465-2.427-.047-1.024-.06-1.379-.06-3.808v-.63c0-2.43.013-2.784.06-3.808.049-1.064.218-1.791.465-2.427a4.902 4.902 0 011.153-1.772A4.902 4.902 0 015.45 2.525c.636-.247 1.363-.416 2.427-.465C8.901 2.013 9.256 2 11.685 2h.63zm-.081 1.802h-.468c-2.456 0-2.784.011-3.807.058-.975.045-1.504.207-1.857.344-.467.182-.8.398-1.15.748-.35.35-.566.683-.748 1.15-.137.353-.3.882-.344 1.857-.047 1.023-.058 1.351-.058 3.807v.468c0 2.456.011 2.784.058 3.807.045.975.207 1.504.344 1.857.182.466.399.8.748 1.15.35.35.683.566 1.15.748.353.137.882.3 1.857.344 1.054.048 1.37.058 4.041.058h.08c2.597 0 2.917-.01 3.96-.058.976-.045 1.505-.207 1.858-.344.466-.182.8-.398 1.15-.748.35-.35.566-.683.748-1.15.137-.353.3-.882.344-1.857.048-1.055.058-1.37.058-4.041v-.08c0-2.597-.01-2.917-.058-3.96-.045-.976-.207-1.505-.344-1.858a3.097 3.097 0 00-.748-1.15 3.098 3.098 0 00-1.15-.748c-.353-.137-.882-.3-1.857-.344-1.023-.047-1.351-.058-3.807-.058zM12 6.865a5.135 5.135 0 110 10.27 5.135 5.135 0 010-10.27zm0 1.802a3.333 3.333 0 100 6.666 3.333 3.333 0 000-6.666zm5.338-3.205a1.2 1.2 0 110 2.4 1.2 1.2 0 010-2.4z"
            clip-rule="evenodd" />
        </svg>
        Instagram
      </a>
    </div>
  </main>

  <script type="module" src="./js/application.js"></script>
</body>

</html>
