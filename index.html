<!DOCTYPE html>
<html lang="tr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>brakte &mdash; Coffee &amp; Kitchen</title>
  <meta name="description" content="brakte Coffee & Kitchen — Tüm ürünler bitkisel. Menü, konum ve daha fazlası için ziyaret edin. All products plant-based.">
  <meta name="robots" content="index, follow">
  <link rel="canonical" href="https://brakte.com.tr/">

  <meta property="og:type" content="website">
  <meta property="og:url" content="https://brakte.com.tr/">
  <meta property="og:site_name" content="brakte">
  <meta property="og:title" content="brakte — Coffee & Kitchen">
  <meta property="og:description" content="Tüm ürünler bitkisel. All products plant-based. Nice food and drinks.">
  <meta property="og:image" content="https://brakte.com.tr/logo.jpg">
  <meta property="og:locale" content="tr_TR">
  <meta property="og:locale:alternate" content="en_US">

  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="brakte — Coffee & Kitchen">
  <meta name="twitter:description" content="Tüm ürünler bitkisel. All products plant-based. Nice food and drinks.">
  <meta name="twitter:image" content="https://brakte.com.tr/logo.jpg">

  <link rel="icon" type="image/jpeg" href="./logo.jpg">
  <link rel="apple-touch-icon" href="./logo.jpg">

  <link rel="stylesheet" href="./css/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
  <main>
    <div class="content">
      <nav class="site-nav">
        <a href="./menu.html" class="nav-link" data-tr="Menü" data-en="Menu">Menü</a>
        <span class="nav-sep">·</span>
        <a href="https://maps.app.goo.gl/U7hAzZR7nf4fJNk27" target="_blank" rel="noopener noreferrer" class="nav-link" data-tr="Yol Tarifi" data-en="Directions">Yol Tarifi</a>
        <span class="nav-sep">·</span>
        <a href="https://instagram.com/brakte.coffee.kitchen" target="_blank" rel="noopener noreferrer" class="nav-link">Instagram</a>
      </nav>
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="tr">TR</button>
        <span class="lang-sep">|</span>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
    <div class="illustration">
      <img src="./brakte_bg.png" alt="brakte cafe">
    </div>
  </main>

  <script>
    const btns = document.querySelectorAll('.lang-btn');
    const links = document.querySelectorAll('.nav-link[data-tr]');

    function setLang(lang) {
      document.documentElement.lang = lang;
      localStorage.setItem('brakte-lang', lang);
      btns.forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      links.forEach(l => l.textContent = l.dataset[lang]);
    }

    btns.forEach(btn => btn.addEventListener('click', () => setLang(btn.dataset.lang)));

    const saved = localStorage.getItem('brakte-lang');
    const browser = navigator.language.startsWith('tr') ? 'tr' : 'en';
    setLang(saved || browser);
  </script>
</body>

</html>
